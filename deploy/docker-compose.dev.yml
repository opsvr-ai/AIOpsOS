version: '3.9'

services:
  db:
    image: docker.1ms.run/pgvector/pgvector:pg15
    container_name: aiopsos-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aiopsos}
      POSTGRES_USER: ${POSTGRES_USER:-aiopsos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aiopsos123}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aiopsos} -d ${POSTGRES_DB:-aiopsos}"]
      interval: 10s
      timeout: 5s
      retries: 6

  redis:
    image: docker.1ms.run/redis:7-alpine
    container_name: aiopsos-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  kafka:
    image: docker.1ms.run/confluentinc/cp-kafka:7.5.0
    container_name: aiopsos-kafka
    hostname: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      # Dual listeners: PLAINTEXT for docker-internal (worker container),
      # EXTERNAL for WSL/host connectivity. Test suites connect via the
      # EXTERNAL listener on localhost:9094.
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    ports:
      - "9092:9092"
      - "9094:9094"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka:9092 >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 6

  # ------------------------------------------------------------------
  # Celery worker — Phase B / task 3.3.
  # Spec: .kiro/specs/agent-runtime-optimization-evolution
  #
  # Consumes three logical queues (memory / wiki / evolution). Shares
  # the same image + source tree as the server; only the entrypoint
  # differs. We use --pool=prefork (default) + -c 4 for a healthy
  # default on dev laptops; override with `docker compose --compatibility`
  # or a `.override.yml` when profiling.
  # ------------------------------------------------------------------
  worker:
    image: aiopsos-server:dev
    build:
      context: ..
      dockerfile: deploy/Dockerfile.server
    container_name: aiopsos-worker
    command: ["celery", "-A", "src.workers.app", "worker", "-Q", "memory,wiki,evolution", "-c", "4", "-l", "info"]
    environment:
      # Reuse the same .env knobs as the server; override only what worker needs.
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://aiopsos:aiopsos123@db:5432/aiopsos}
      SYNC_DATABASE_URL: ${SYNC_DATABASE_URL:-postgresql://aiopsos:aiopsos123@db:5432/aiopsos}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      # Explicitly NOT "allinone" — the worker has its own lifecycle.
      SERVICE_TYPE: worker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "celery -A src.workers.app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  db_data:
