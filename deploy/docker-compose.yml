version: '3.9'

services:
  # ── Infrastructure ──────────────────────────────────────────

  db:
    image: docker.1ms.run/pgvector/pgvector:pg15
    container_name: aiopsos-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aiopsos}
      POSTGRES_USER: ${POSTGRES_USER:-aiopsos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aiopsos123}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aiopsos} -d ${POSTGRES_DB:-aiopsos}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: docker.1ms.run/redis:7-alpine
    container_name: aiopsos-redis
    restart: unless-stopped
    volumes:
      - ./redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: docker.1ms.run/confluentinc/cp-kafka:7.5.0
    container_name: aiopsos-kafka
    restart: unless-stopped
    hostname: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    volumes:
      - ./kafka_data:/var/lib/kafka/data
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka:9092 >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Application ────────────────────────────────────────────

  server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.server
    image: aiopsos-server:latest
    container_name: aiopsos-server
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://aiopsos:aiopsos123@db:5432/aiopsos}
      SYNC_DATABASE_URL: ${SYNC_DATABASE_URL:-postgresql://aiopsos:aiopsos123@db:5432/aiopsos}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      SECRET_KEY: ${SECRET_KEY:-change-me-to-a-random-string}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      # Default "server" — API only. Dedicated ``worker`` service below
      # handles Celery queues. Set SERVICE_TYPE=allinone in .env to spawn
      # an embedded worker inside this process instead (single-container
      # dev setup); in that case, leave the ``worker`` service stopped.
      SERVICE_TYPE: ${SERVICE_TYPE:-server}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1536}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_DIR: ${LOG_DIR:-data/logs}
      LOG_FORMAT: ${LOG_FORMAT:-text}
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-30}
      WIKI_PATH: ${WIKI_PATH:-data/knowledge}
      KB_MONITOR_ENABLED: ${KB_MONITOR_ENABLED:-true}
      KB_MONITOR_POLL_INTERVAL: ${KB_MONITOR_POLL_INTERVAL:-30}
      KB_MONITOR_MODEL: ${KB_MONITOR_MODEL:-deepseek-v4-flash}
      UPLOAD_DIR: ${UPLOAD_DIR:-uploads}
      PROGRESS_ANALYSIS_INTERVAL: ${PROGRESS_ANALYSIS_INTERVAL:-300}
      PROGRESS_ANALYSIS_ENABLED: ${PROGRESS_ANALYSIS_ENABLED:-true}
    volumes:
      - ./server_uploads:/app/uploads
      - ./server_data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Celery worker — reuses the server image (task 3.3 / 29.2).
  # Consumes memory / wiki / evolution queues. `celery` binary is
  # installed to /usr/local/bin by poetry (virtualenvs.create=false)
  # in Dockerfile.server, so it resolves on PATH.
  #
  # Startup ordering (deploy fix): worker must wait for ``server`` to be
  # healthy. The server container runs ``alembic upgrade head`` as part
  # of its entrypoint, so by the time its healthcheck is green the schema
  # is at head. Without this, both containers race on the same DB and one
  # of them hits a duplicate-column failure.
  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.server
    image: aiopsos-server:latest
    container_name: aiopsos-worker
    restart: unless-stopped
    command: ["celery", "-A", "src.workers.app", "worker", "-Q", "memory,wiki,evolution", "-c", "4", "-l", "info"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://aiopsos:aiopsos123@db:5432/aiopsos}
      SYNC_DATABASE_URL: ${SYNC_DATABASE_URL:-postgresql://aiopsos:aiopsos123@db:5432/aiopsos}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      SECRET_KEY: ${SECRET_KEY:-change-me-to-a-random-string}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1536}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_DIR: ${LOG_DIR:-data/logs}
      LOG_FORMAT: ${LOG_FORMAT:-text}
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-30}
      WIKI_PATH: ${WIKI_PATH:-data/knowledge}
      KB_MONITOR_ENABLED: ${KB_MONITOR_ENABLED:-true}
      KB_MONITOR_POLL_INTERVAL: ${KB_MONITOR_POLL_INTERVAL:-30}
      KB_MONITOR_MODEL: ${KB_MONITOR_MODEL:-deepseek-v4-flash}
      # Explicitly NOT "allinone" — the worker has its own lifecycle.
      SERVICE_TYPE: worker
    volumes:
      - ./server_data:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A src.workers.app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    image: aiopsos-web:latest
    container_name: aiopsos-web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  db_data:
