name: Docker Build

on:
  push:
    branches: [main]

jobs:
  build-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build server image
        run: docker build -t aiopsos-server:latest ./server

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build web image
        run: docker build -t aiopsos-web:latest ./web
